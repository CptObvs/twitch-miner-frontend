<div
  class="flex min-h-screen items-center justify-center bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 px-4"
>
  <div class="absolute inset-0 overflow-hidden">
    <div
      class="absolute -top-1/2 -left-1/2 h-full w-full rounded-full bg-twitch/5 blur-3xl animate-pulse"
    ></div>
    <div
      class="absolute -bottom-1/2 -right-1/2 h-full w-full rounded-full bg-twitch-dark/5 blur-3xl animate-pulse"
      style="animation-delay: 1s"
    ></div>
  </div>

  <div class="relative w-full max-w-sm space-y-6">
    <div class="text-center">
      <img
        src="miner.png"
        alt="Twitch Miner"
        class="mx-auto mb-4 h-24 w-24 drop-shadow-[0_0_15px_rgba(145,70,255,0.4)]"
      />
      <h1
        class="text-3xl font-bold bg-gradient-to-r from-twitch-light via-twitch to-twitch-dark bg-clip-text text-transparent"
      >
        Twitch Miner
      </h1>
      <p class="mt-1 text-xs font-semibold tracking-widest text-gray-500 uppercase">by NGC</p>
    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="space-y-4 rounded-2xl border border-gray-800/50 bg-gray-900/50 p-6 shadow-2xl shadow-black/50 backdrop-blur-xl"
    >
      @if (error()) {
        <div
          class="animate-shake rounded-xl border border-red-500/20 bg-gradient-to-r from-red-900/40 to-red-800/40 p-3 text-sm text-red-300 shadow-lg shadow-red-900/20"
          role="alert"
        >
          <div class="flex items-center gap-2">
            <svg
              class="h-5 w-5 flex-shrink-0"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"
              />
            </svg>
            <span>{{ error() }}</span>
          </div>
        </div>
      }

      <div>
        <input
          id="username"
          formControlName="username"
          type="text"
          autocomplete="username"
          class="w-full rounded-xl border border-gray-700/50 bg-gray-800/50 px-4 py-2.5 text-gray-100 placeholder-gray-500 shadow-inner backdrop-blur-sm transition-all duration-200 focus:border-twitch focus:bg-gray-800 focus:ring-2 focus:ring-twitch/50 focus:outline-none"
          placeholder="Choose a username"
        />
      </div>

      <div>
        <input
          id="password"
          formControlName="password"
          type="password"
          autocomplete="new-password"
          class="w-full rounded-xl border border-gray-700/50 bg-gray-800/50 px-4 py-2.5 text-gray-100 placeholder-gray-500 shadow-inner backdrop-blur-sm transition-all duration-200 focus:border-twitch focus:bg-gray-800 focus:ring-2 focus:ring-twitch/50 focus:outline-none"
          placeholder="Choose a password"
        />
      </div>

      <div>
        <input
          id="code"
          formControlName="registrationCode"
          type="text"
          class="w-full rounded-xl border border-gray-700/50 bg-gray-800/50 px-4 py-2.5 text-gray-100 placeholder-gray-500 shadow-inner backdrop-blur-sm transition-all duration-200 focus:border-twitch focus:bg-gray-800 focus:ring-2 focus:ring-twitch/50 focus:outline-none"
          placeholder="Enter your invite code"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-twitch to-twitch-dark px-4 py-3 font-semibold text-white shadow-lg shadow-twitch/30 transition-all duration-200 hover:scale-[1.02] hover:shadow-xl hover:shadow-twitch/40 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:scale-100"
      >
        <div
          class="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 opacity-0 transition-opacity duration-500 group-hover:opacity-100"
        ></div>
        <span class="relative flex items-center justify-center gap-2">
          @if (loading()) {
            <svg class="h-5 w-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Creating account...
          } @else {
            Register
          }
        </span>
      </button>
    </form>

    <p class="text-center text-sm text-gray-400">
      Already have an account?
      <a
        routerLink="/login"
        class="font-medium text-twitch-light transition-colors hover:text-twitch hover:underline"
        >Sign in</a
      >
    </p>
  </div>
</div>
